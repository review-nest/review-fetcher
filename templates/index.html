<!DOCTYPE html>
<html>

<head>

<title>Review Fetcher</title>

<style>

*{
box-sizing:border-box;
}

body{
background:#f8fafc;
font-family:Arial,sans-serif;
padding:20px;
color:#202124;
}


.box{
max-width:650px;
margin:auto;
background:white;
padding:22px;
border-radius:18px;
box-shadow:0 5px 25px rgba(0,0,0,.08);
}


/* FORM */

h2{
text-align:center;
}


label{
display:block;
margin-top:15px;
font-weight:600;
}


input,select,textarea{

width:100%;
padding:12px;
margin-top:7px;
border:1px solid #ddd;
border-radius:10px;

}


textarea{
height:90px;
resize:none;
}


.fetch-btn{

margin-top:18px;
padding:12px 25px;
background:#1a73e8;
border:none;
border-radius:20px;
color:white;
cursor:pointer;

}



/* APP HEADER */

.app-header{

display:flex;
align-items:center;
gap:15px;
margin-top:25px;
padding-bottom:18px;
border-bottom:1px solid #eee;

}


.app-icon{

width:75px;
height:75px;
border-radius:16px;
object-fit:cover;

}


.app-title{

font-size:22px;
font-weight:600;

}


.app-subtitle{

font-size:15px;
color:#5f6368;
margin-top:5px;

}


.close{

margin-left:auto;
font-size:32px;
color:#555;

}



/* REVIEWS */


.review-heading{

font-size:20px;
font-weight:600;
margin:20px 0;

}



.review{

padding:20px 0;
border-bottom:1px solid #e5e7eb;

}


.user-row{

display:flex;
align-items:center;
gap:14px;

}


.user-img{

width:45px;
height:45px;
border-radius:50%;

}



.user{

font-weight:600;
font-size:16px;

}



.stars{

color:#008577;
font-size:18px;
letter-spacing:2px;

}



.date{

color:#5f6368;
font-size:14px;

margin-top:4px;

}



.comment{

font-size:17px;
margin:15px 0;
line-height:1.4;

}



.help{

font-size:15px;
color:#5f6368;
margin-bottom:12px;

}



.small-btn{

background:white;
border:1px solid #ddd;
border-radius:25px;
padding:8px 28px;
margin-right:10px;

}


.total{

font-weight:600;
margin-top:15px;

}



</style>


</head>


<body>


<div class="box">



<!-- FORM -->


<h2>
Play Store Reviews
</h2>



<form method="POST">



<label>
Package ID
</label>


<input
name="package"
placeholder="Example: com.whatsapp"
required>



<label>
Select Review Date
</label>


<input
type="date"
name="date"
required>



<label>
⭐ Select Rating
</label>



<select name="rating">


<option value="">
All Stars
</option>


<option value="5">
⭐⭐⭐⭐⭐
</option>


<option value="4">
⭐⭐⭐⭐
</option>


<option value="3">
⭐⭐⭐
</option>


<option value="2">
⭐⭐
</option>


<option value="1">
⭐
</option>


</select>




<label>
🔍 Search Comment
</label>


<textarea
name="keyword"
placeholder="Enter keyword">
</textarea>



<button class="fetch-btn">

Fetch Reviews

</button>


</form>





{% if reviews %}



<!-- APP HEADER -->


<div class="app-header">


<img
src="{{app_info.icon if app_info else ''}}"
class="app-icon">



<div>


<div class="app-title">

{{app_info.title if app_info else package}}

</div>



<div class="app-subtitle">

Ratings and reviews

</div>


</div>



<div class="close">

×

</div>


</div>





<div class="review-heading">

Ratings and reviews

</div>





<div class="total">

Total Reviews: {{reviews|length}}

</div>





{% for r in reviews %}



<div class="review">



<div class="user-row">



<img

src="{{r.userImage}}"

class="user-img">



<div>



<div class="user">

{{r.userName}}

</div>



<div class="stars">

★★★★★

</div>



<div class="date">

{{r.at.strftime("%B %d, %Y")}}

</div>



</div>



</div>





<div class="comment">

{{r.content}}

</div>




<div class="help">

Did you find this helpful?

</div>




<button class="small-btn">

Yes

</button>



<button class="small-btn">

No

</button>




</div>



{% endfor %}



{% endif %}





</div>


</body>


</html>
